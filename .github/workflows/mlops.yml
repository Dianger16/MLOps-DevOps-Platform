name: MLOps Pipeline — Train → Test → Deploy

on:
  push:
    branches: [main]
    paths:
      - "model/**"
      - "api/**"
      - "requirements.txt"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "manual run"

env:
  ECR_REPOSITORY: sentiment-api
  EKS_CLUSTER:    mlops-platform
  AWS_REGION:     us-east-1
  MODEL_NAME:     sentiment-classifier

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Train + Evaluate
  # Trains the model and validates quality before deploying
  # ─────────────────────────────────────────────────────────────────
  train:
    name: Train & Evaluate Model
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start MLflow (local for CI)
        run: |
          mlflow server \
            --host 127.0.0.1 \
            --port 5000 \
            --backend-store-uri sqlite:///mlflow.db \
            --default-artifact-root ./mlflow-artifacts &
          sleep 5

      - name: Train model
        env:
          MLFLOW_TRACKING_URI: http://127.0.0.1:5000
          MLFLOW_EXPERIMENT_NAME: sentiment-analysis-ci
          MODEL_NAME: ${{ env.MODEL_NAME }}
        run: |
          python model/train.py
          echo "Training complete"

      - name: Validate model quality gate
        env:
          MLFLOW_TRACKING_URI: http://127.0.0.1:5000
        run: |
          python - << 'PYEOF'
          import mlflow, sys
          client = mlflow.tracking.MlflowClient("http://127.0.0.1:5000")

          exp = client.get_experiment_by_name("sentiment-analysis-ci")
          if exp is None:
              print("ERROR: Experiment not found — training may have failed")
              sys.exit(1)

          runs = client.search_runs(
              exp.experiment_id,
              order_by=["start_time DESC"],
              max_results=1
          )
          if not runs:
              print("ERROR: No runs found in experiment")
              sys.exit(1)

          run = runs[0]
          accuracy = run.data.metrics.get("accuracy", 0)
          f1       = run.data.metrics.get("f1_macro", 0)

          print(f"Accuracy: {accuracy:.4f}")
          print(f"F1 Score: {f1:.4f}")

          if accuracy < 0.70:
              print(f"FAILED: Accuracy {accuracy:.4f} < 0.70 threshold")
              sys.exit(1)
          if f1 < 0.65:
              print(f"FAILED: F1 {f1:.4f} < 0.65 threshold")
              sys.exit(1)

          print("Quality gate PASSED")
          PYEOF

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: model/artifacts/model.pkl
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Test API
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Test API
    runs-on: ubuntu-latest
    needs: train

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: model/artifacts/

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: Build & Push Docker image to ECR
  # ─────────────────────────────────────────────────────────────────
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: model/artifacts/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build \
            --build-arg MODEL_VERSION=$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────
  # JOB 4: Deploy to EKS
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Deploy to EKS
        env:
          IMAGE: ${{ needs.build.outputs.image }}
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/sentiment-api \
            --timeout=5m

      - name: Run post-deploy smoke test
        run: |
          SERVICE_IP=$(kubectl get svc sentiment-api \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          sleep 10
          curl -f "http://$SERVICE_IP/health" || exit 1
          echo "Smoke test passed"